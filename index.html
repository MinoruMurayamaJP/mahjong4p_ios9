<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#15395f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="麻雀スコア">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>麻雀スコア</title>
  <link rel="apple-touch-icon" href="./mahjong4p_score.jpg">
  <link rel="icon" href="./mahjong4p_score.jpg" type="image/jpeg">
  <link rel="manifest" href="./manifest.webmanifest">
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --line: #d9e0e7;
      --text: #17202a;
      --muted: #647282;
      --plus: #1264c8;
      --minus: #c83232;
      --warn: #a65f00;
      --button: #15395f;
      --button-text: #ffffff;
      --main-font-size: 23px;
      --button-font-size: 16px;
    }


/* 閉じるボタンのスタイル */
    .modal-close-btn {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      background: #647282;
      color: #ffffff;
      border: 0;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }




    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ポップアップ表示時に背景のスクロールを禁止する設定 */
    body.modal-open {
      overflow: hidden !important;
    }

    .sticky-top {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(244, 246, 248, 0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 2px 10px rgba(23, 32, 42, 0.06);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px 6px;
    }

    h1 {
      margin: 0;
      font-size: var(--main-font-size);
      line-height: 1.2;
    }

    .version {
      color: var(--muted);
      font-size: var(--button-font-size);
      font-weight: 700;
      white-space: nowrap;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 12px 12px 28px;
    }

    .sticky-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 12px 10px;
    }

    .sticky-inner section {
      margin-bottom: 8px;
    }

    section {
      margin-bottom: 12px;
      padding: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .head-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    h2 {
      margin: 0;
      font-size: var(--main-font-size);
    }

    .muted {
      color: var(--muted);
      font-size: var(--button-font-size);
    }

    .settings {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: var(--main-font-size);
      text-align: center;
    }

    input {
      width: 100%;
      min-height: 40px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: var(--main-font-size);
      text-align: center;
    }

    input[type="number"] {
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .setting-card {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfd;
    }

    .setting-card input {
      margin-top: 6px;
      min-height: 42px;
      font-weight: 700;
    }

    .totals {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .total-card {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfd;
    }

    .name {
      min-height: 20px;
      overflow: hidden;
      color: var(--text);
      font-size: var(--main-font-size);
      font-weight: 700;
      text-align: center;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .score {
      margin-top: 4px;
      font-size: var(--main-font-size);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      text-align: center;
    }

    .money {
      margin-top: 2px;
      font-size: var(--main-font-size);
      font-variant-numeric: tabular-nums;
      text-align: center;
    }

    .plus {
      color: var(--plus);
    }

    .minus {
      color: var(--minus);
    }

    .round {
      margin-bottom: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .round:last-child {
      margin-bottom: 0;
    }

    .round-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .round-title {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .modal-container .round-title {
      flex: 1;
    }

    .balance {
      color: var(--muted);
      font-size: var(--button-font-size);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .balance.warn {
      color: var(--warn);
    }

    .round-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .input-card {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfd;
    }

    .player-btn {
      display: block;
      width: 100%;
      min-height: 36px;
      padding: 2px 4px;
      background: #e8edf3;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: var(--main-font-size);
      font-weight: 700;
      text-align: center;
      text-overflow: ellipsis;
      white-space: nowrap;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }

    .player-btn:active {
      background: #d1daf0;
    }

    .input-card.locked .player-btn {
      background: transparent;
      border-color: transparent;
      cursor: default;
      padding: 2px 4px;
    }

    .auto {
      margin-top: 6px;
      text-align: center;
      font-size: var(--main-font-size);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    /* ーーー 追加：ポップアップ（モーダル）用の一割大きいスタイル設定 ーーー */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100dvh;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 9999;
      align-items: flex-start;
      justify-content: center;
      padding: calc(env(safe-area-inset-top, 0px) + 8px) 12px 12px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .modal-overlay.show {
      display: flex;
    }

    /* 指示：サイズは一割くらい大きめで（1.1倍に拡大表示） */
    .modal-container {
      width: 100%;
      max-width: 792px; /* 元の720pxの1.1倍 */
      transform: scale(1.1);
      transform-origin: top center;
      padding: 4px;
    }

    /* モーダル内の一割大きい各種パーツ調整 */
    .modal-container .round {
      box-shadow: 0 12px 36px rgba(0,0,0,0.25);
      border-width: 2px;
    }


    /* Popヘッダー情報 */
    .modal-info-head {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
      width: 100%;
      margin-bottom: 10px;
    }

    .modal-round-title {
      font-size: var(--main-font-size);
      font-weight: 700;
      white-space: nowrap;
    }

    .modal-help {
      color: var(--muted);
      font-size: var(--button-font-size);
      text-align: center;
    }

    @media (max-width: 520px) {
      .modal-info-head {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .modal-info-head .balance {
        text-align: center;
      }
    }

    /* Pop内の操作ボタンは均等割りで配置 */
    .modal-actions {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      width: 100%;
    }

    .modal-actions button {
      width: 100%;
      white-space: nowrap;
    }

    @media (max-width: 520px) {
      .modal-actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    /* ーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーー */

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .image-preview {
      display: none;
      margin-top: 12px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      text-align: center;
    }

    .image-preview.show {
      display: block;
    }

    .image-preview img {
      display: block;
      width: 100%;
      height: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .image-preview img:not([src]) {
      display: none;
    }

    .image-preview a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      margin-top: 2em;
      padding: 8px 12px;
      border-radius: 8px;
      background: var(--button);
      color: var(--button-text);
      font-size: var(--button-font-size);
      font-weight: 700;
      text-decoration: none;
    }

    button {
      min-height: 42px;
      border: 0;
      border-radius: 8px;
      background: var(--button);
      color: var(--button-text);
      font: inherit;
      font-size: var(--button-font-size);
      font-weight: 700;
    }

    button.small {
      min-height: 42px;
      padding: 6px 10px;
      font-size: var(--button-font-size);
      white-space: nowrap;
    }

    button.secondary {
      background: #e8edf3;
      color: var(--text);
    }

    button.danger {
      background: #b92f2f;
      color: #fff;
    }

    button.round-clear {
      background: #f8c7d5;
      color: #7a2034;
    }

    button.round-restore {
      background: #d8f3dc;
      color: #2d6a4f;
    }

    button.modal-cancel {
      background: #95d5b2;
      color: #1b4332;
    }

    button.round-lock {
      background: #d8ecff;
      color: #174c7c;
    }

    button.round-lock.locked {
      background: #174c7c;
      color: #ffffff;
      border: 2px solid #174c7c;
    }

    /* ポップアップ内の「入力完了」状態の緑色ボタンのスタイル */
    button.round-lock.editing-active {
      background: #15395f;
      color: #ffffff;
      border: 2px solid #15395f;
    }

    button.input-mode {
      background: #d8ecff;
      color: #174c7c;
      border: 0;
    }

    button.input-mode.active {
      background: #174c7c;
      color: #ffffff;
      border: 2px solid #174c7c;
    }

    button.all-lock {
      background: #d8ecff;
      color: #174c7c;
    }

    .input-card.locked {
      background: #f1f3f5;
      opacity: 0.72;
    }

    .setting-card.locked {
      background: #f1f3f5;
      opacity: 0.72;
    }

    .input-card input:disabled {
      color: var(--text);
      -webkit-text-fill-color: var(--text);
      background: #eef1f4;
    }

    @media (min-width: 620px) {
      .totals {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .settings {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .round-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    /* iOS 9.3.5 / iPad mini 用レイアウト調整
       CSS Grid / gap が効かない環境でも、合計・入力・設定を横並びで表示する */
    .head-actions {
      gap: 0;
      margin: -4px;
    }

    .head-actions > * {
      margin: 4px;
    }

    .totals,
    .settings,
    .round-grid,
    .modal-actions {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-flex-wrap: wrap;
      flex-wrap: wrap;
      gap: 0;
      margin: -4px;
    }

    .total-card,
    .setting-card,
    .input-card,
    .modal-actions button {
      margin: 4px;
    }

    .totals .total-card,
    .settings .setting-card,
    .round-grid .input-card {
      width: -webkit-calc(50% - 8px);
      width: calc(50% - 8px);
    }

    .modal-actions button {
      width: -webkit-calc(50% - 8px);
      width: calc(50% - 8px);
    }

    .modal-info-head {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-flex-wrap: wrap;
      flex-wrap: wrap;
      -webkit-align-items: center;
      align-items: center;
      gap: 0;
      margin: -4px -4px 8px;
    }

    .modal-info-head > * {
      margin: 4px;
    }

    .modal-info-head .modal-help {
      -webkit-box-flex: 1;
      -webkit-flex: 1 1 280px;
      flex: 1 1 280px;
    }

    .modal-info-head .balance {
      margin-left: auto;
    }

    @media (min-width: 620px) {
      .totals .total-card,
      .round-grid .input-card {
        width: -webkit-calc(25% - 8px);
        width: calc(25% - 8px);
      }

      .settings .setting-card {
        width: -webkit-calc(20% - 8px);
        width: calc(20% - 8px);
      }

      .modal-actions button {
        width: -webkit-calc(25% - 8px);
        width: calc(25% - 8px);
      }
    }

  </style>
</head>
<body>

  <div id="modalOverlay" class="modal-overlay">
    <div id="modalContainer" class="modal-container">
      </div>
  </div>

  <div class="sticky-top">
    <header>
      <h1>麻雀スコア</h1>
      <div class="version">Ver.20260612-1140</div>
    </header>

    <div class="sticky-inner">
      <section>
        <div class="section-head">
          <h2>合計</h2>
          <div class="head-actions">
            <button id="toggleAllLocks" type="button" class="small all-lock">全ての入力ロック</button>
            <button id="jumpToSettings" type="button" class="secondary small">設定へ</button>
            <button id="makeImage" type="button" class="secondary small">画像作成</button>
            <button id="clearScores" type="button" class="danger small">全ての点数クリア</button>
          </div>
        </div>
        <div id="rateLabel" class="muted"></div>
        <div id="totals" class="totals"></div>
      </section>
    </div>
  </div>

  <main>
    <section id="scoreInputSection">
      <div class="section-head">
        <h2>入力</h2>
        <span class="muted">名前タップで＋－反転 / 空欄1人なら差額補完</span>
      </div>
      <div id="rounds"></div>
      <div class="actions">
        <button id="addRound" type="button" class="secondary">回を追加</button>
      </div>
    </section>

    <section>
      <div class="section-head">
        <h2>設定</h2>
        <div class="head-actions">
          <button id="settingsLockToggle" type="button" class="small round-lock">入力ロック</button>
          <button id="inputModeToggle" type="button" class="small input-mode">入力モード</button>
          <button id="scoreInputModeToggle" type="button" class="small input-mode">点数入力文字</button>
          <button id="jumpToInput" type="button" class="secondary small">最終入力行へ</button>
          <span class="muted">自動保存</span>
        </div>
      </div>
      <div class="settings">
        <div class="setting-card">
          <label for="rate">倍率</label>
          <input id="rate" inputmode="numeric" type="text">
        </div>
        <div class="setting-card">
          <label for="player0">P1</label>
          <input id="player0" type="text">
        </div>
        <div class="setting-card">
          <label for="player1">P2</label>
          <input id="player1" type="text">
        </div>
        <div class="setting-card">
          <label for="player2">P3</label>
          <input id="player2" type="text">
        </div>
        <div class="setting-card">
          <label for="player3">P4</label>
          <input id="player3" type="text">
        </div>
      </div>
    </section>

    <section id="imagePreview" class="image-preview">
      <div class="section-head">
        <h2>画像</h2>
        <button id="backToInputFromImage" type="button" class="secondary small">最終入力行へ</button>
      </div>
      <img id="scoreImage" alt="麻雀スコア画像">
      <a id="downloadImage" href="#" download="mahjong-score.png">画像を保存</a>
      <div class="muted">iPhoneでは画像を長押しして保存できます。</div>
    </section>
  </main>
