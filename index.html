<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#15395f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="麻雀スコア">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>麻雀スコア</title>
  <link rel="apple-touch-icon" href="./mahjong4p_score.jpg">
  <link rel="apple-touch-icon" sizes="180x180" href="./mahjong4p_score_192.jpg">
  <link rel="apple-touch-icon" sizes="192x192" href="./mahjong4p_score_192.jpg">
  <link rel="icon" href="./mahjong4p_score.jpg" type="image/jpeg">
  <link rel="manifest" href="./manifest.webmanifest">
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --line: #d9e0e7;
      --text: #17202a;
      --muted: #647282;
      --plus: #1264c8;
      --minus: #c83232;
      --warn: #a65f00;
      --button: #15395f;
      --button-text: #ffffff;
      --main-font-size: 23px;
      --button-font-size: 16px;
    }


/* 閉じるボタンのスタイル */
    .modal-close-btn {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      background: #647282;
      color: #ffffff;
      border: 0;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }




    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ポップアップ表示時に背景のスクロールを禁止する設定 */
    body.modal-open {
      overflow: hidden !important;
    }

    .sticky-top {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(244, 246, 248, 0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 2px 10px rgba(23, 32, 42, 0.06);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px 6px;
    }

    h1 {
      margin: 0;
      font-size: var(--main-font-size);
      line-height: 1.2;
    }

    .version {
      color: var(--muted);
      font-size: var(--button-font-size);
      font-weight: 700;
      white-space: nowrap;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 12px 12px 28px;
    }

    .sticky-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 12px 10px;
    }

    .sticky-inner section {
      margin-bottom: 8px;
    }

    section {
      margin-bottom: 12px;
      padding: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .head-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    h2 {
      margin: 0;
      font-size: var(--main-font-size);
    }

    .muted {
      color: var(--muted);
      font-size: var(--button-font-size);
    }

    .settings {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: var(--main-font-size);
      text-align: center;
    }

    input {
      width: 100%;
      min-height: 40px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: var(--main-font-size);
      text-align: center;
    }

    input[type="number"] {
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .setting-card {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfd;
    }

    .setting-card input {
      margin-top: 6px;
      min-height: 42px;
      font-weight: 700;
    }

    .totals {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .total-card {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfd;
    }

    .name {
      min-height: 20px;
      overflow: hidden;
      color: var(--text);
      font-size: var(--main-font-size);
      font-weight: 700;
      text-align: center;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .score {
      margin-top: 4px;
      font-size: var(--main-font-size);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      text-align: center;
    }

    .money {
      margin-top: 2px;
      font-size: var(--main-font-size);
      font-variant-numeric: tabular-nums;
      text-align: center;
    }

    .plus {
      color: var(--plus);
    }

    .minus {
      color: var(--minus);
    }

    .round {
      margin-bottom: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .round:last-child {
      margin-bottom: 0;
    }

    .round-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .round-title {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .modal-container .round-title {
      flex: 1;
    }

    .balance {
      color: var(--muted);
      font-size: var(--button-font-size);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .balance.warn {
      color: var(--warn);
    }

    .round-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .input-card {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfd;
    }

    .player-btn {
      display: block;
      width: 100%;
      min-height: 36px;
      padding: 2px 4px;
      background: #e8edf3;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: var(--main-font-size);
      font-weight: 700;
      text-align: center;
      text-overflow: ellipsis;
      white-space: nowrap;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }

    .player-btn:active {
      background: #d1daf0;
    }

    .input-card.locked .player-btn {
      background: transparent;
      border-color: transparent;
      cursor: default;
      padding: 2px 4px;
    }

    .auto {
      margin-top: 6px;
      text-align: center;
      font-size: var(--main-font-size);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    /* ーーー 追加：ポップアップ（モーダル）用の一割大きいスタイル設定 ーーー */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      background: rgba(0, 0, 0, 0.68);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 9999;
      align-items: flex-start;
      justify-content: center;
      padding: calc(env(safe-area-inset-top, 0px) + 8px) 12px 12px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .modal-overlay.show {
      display: flex;
    }

    /* 指示：サイズは一割くらい大きめで（1.1倍に拡大表示） */
    .modal-container {
      width: 100%;
      max-width: 660px; /* iPad mini / iOS9で横にはみ出さない幅 */
      transform: none;
      transform-origin: top center;
      padding: 4px;
    }

    /* モーダル内の一割大きい各種パーツ調整 */
    .modal-container .round {
      width: 100%;
      box-shadow: 0 12px 36px rgba(0,0,0,0.35);
      border-width: 2px;
    }


    /* Popヘッダー情報 */
    .modal-info-head {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
      width: 100%;
      margin-bottom: 10px;
    }

    .modal-round-title {
      font-size: var(--main-font-size);
      font-weight: 700;
      white-space: nowrap;
    }

    .modal-help {
      color: var(--muted);
      font-size: var(--button-font-size);
      text-align: center;
    }

    @media (max-width: 520px) {
      .modal-info-head {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .modal-info-head .balance {
        text-align: center;
      }
    }

    /* Pop内の操作ボタンは均等割りで配置 */
    .modal-actions {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      width: 100%;
    }

    .modal-actions button {
      width: 100%;
      white-space: nowrap;
    }

    @media (max-width: 520px) {
      .modal-actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    /* ーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーー */

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .image-preview {
      display: none;
      margin-top: 12px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      text-align: center;
    }

    .image-preview.show {
      display: block;
    }

    .image-preview img {
      display: block;
      width: 100%;
      height: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .image-preview img:not([src]) {
      display: none;
    }

    .image-preview a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      margin-top: 2em;
      padding: 8px 12px;
      border-radius: 8px;
      background: var(--button);
      color: var(--button-text);
      font-size: var(--button-font-size);
      font-weight: 700;
      text-decoration: none;
    }

    button {
      min-height: 42px;
      border: 0;
      border-radius: 8px;
      background: var(--button);
      color: var(--button-text);
      font: inherit;
      font-size: var(--button-font-size);
      font-weight: 700;
    }

    button.small {
      min-height: 42px;
      padding: 6px 10px;
      font-size: var(--button-font-size);
      white-space: nowrap;
    }

    button.secondary {
      background: #e8edf3;
      color: var(--text);
    }

    button.danger {
      background: #b92f2f;
      color: #fff;
    }

    button.round-clear {
      background: #f8c7d5;
      color: #7a2034;
    }

    button.round-restore {
      background: #d8f3dc;
      color: #2d6a4f;
    }

    button.modal-cancel {
      background: #95d5b2;
      color: #1b4332;
    }

    button.round-lock {
      background: #d8ecff;
      color: #174c7c;
    }

    button.round-lock.locked {
      background: #174c7c;
      color: #ffffff;
      border: 2px solid #174c7c;
    }

    /* ポップアップ内の「入力完了」状態の緑色ボタンのスタイル */
    button.round-lock.editing-active {
      background: #15395f;
      color: #ffffff;
      border: 2px solid #15395f;
    }

    button.input-mode {
      background: #d8ecff;
      color: #174c7c;
      border: 0;
    }

    button.input-mode.active {
      background: #174c7c;
      color: #ffffff;
      border: 2px solid #174c7c;
    }

    button.all-lock {
      background: #d8ecff;
      color: #174c7c;
    }

    .input-card.locked {
      background: #f1f3f5;
      opacity: 0.72;
    }

    .setting-card.locked {
      background: #f1f3f5;
      opacity: 0.72;
    }

    .input-card input:disabled {
      color: var(--text);
      -webkit-text-fill-color: var(--text);
      background: #eef1f4;
    }

    @media (min-width: 620px) {
      .totals {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .settings {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .round-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    /* iOS 9.3.5 / iPad mini 用レイアウト調整
       CSS Grid / gap が効かない環境でも、合計・入力・設定を横並びで表示する */
    .head-actions {
      gap: 0;
      margin: -4px;
    }

    .head-actions > * {
      margin: 4px;
    }

    .totals,
    .settings,
    .round-grid,
    .modal-actions {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-flex-wrap: wrap;
      flex-wrap: wrap;
      gap: 0;
      margin: -4px;
    }

    .total-card,
    .setting-card,
    .input-card,
    .modal-actions button {
      margin: 4px;
    }

    .totals .total-card,
    .settings .setting-card,
    .round-grid .input-card {
      width: -webkit-calc(50% - 8px);
      width: calc(50% - 8px);
    }

    .modal-actions button {
      width: -webkit-calc(50% - 8px);
      width: calc(50% - 8px);
    }

    .modal-info-head {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-flex-wrap: wrap;
      flex-wrap: wrap;
      -webkit-align-items: center;
      align-items: center;
      gap: 0;
      margin: -4px -4px 8px;
    }

    .modal-info-head > * {
      margin: 4px;
    }

    .modal-info-head .modal-help {
      -webkit-box-flex: 1;
      -webkit-flex: 1 1 280px;
      flex: 1 1 280px;
    }

    .modal-info-head .balance {
      margin-left: auto;
    }

    @media (min-width: 620px) {
      .totals .total-card,
      .round-grid .input-card {
        width: -webkit-calc(25% - 8px);
        width: calc(25% - 8px);
      }

      .settings .setting-card {
        width: -webkit-calc(20% - 8px);
        width: calc(20% - 8px);
      }

      .modal-actions button {
        width: -webkit-calc(25% - 8px);
        width: calc(25% - 8px);
      }
    }


    /* iPad mini専用 Popテンキー */
    .popup-score-input.active {
      border: 2px solid #174c7c;
      box-shadow: 0 0 0 2px rgba(23, 76, 124, 0.15);
      background: #ffffff;
    }

    .tenkey-wrap {
      width: 85%;
      margin: 14px auto 0;
      padding: 10px;
      border-radius: 10px;
      background: #d3d6da;
      border: 1px solid #b9bec5;
    }

    .tenkey-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 8px;
      table-layout: fixed;
    }

    .tenkey-table td {
      width: 25%;
      padding: 0;
      vertical-align: middle;
    }

    .tenkey-key {
      /* iOS 9.3.5 Safari対策：flex中央寄せは文字が左寄りになるため、昔ながらのline-height中央寄せにする */
      display: block;
      width: 100%;
      min-height: 64px;
      height: 64px;
      padding: 0;
      border-radius: 12px;
      border: 2px solid #0b0f12;
      background: #15191d;
      color: #ffffff;
      font-size: 34px;
      font-weight: 700;
      line-height: 64px;
      text-align: center;
      box-shadow: inset 0 2px 2px rgba(255,255,255,0.18), 0 3px 3px rgba(0,0,0,0.35);
      -webkit-appearance: none;
    }

    .tenkey-key:active {
      background: #2a3036;
    }

    .tenkey-key.small-label,
    .tenkey-key.backtab-key,
    .tenkey-key.return-key {
      font-size: 80%;
      text-align: center;
      padding: 0;
    }

    .tenkey-key.return-key {
      min-height: 136px;
      height: 136px;
      line-height: 136px;
    }

    @media (max-width: 620px) {
      .tenkey-wrap {
        width: 92%;
      }
      .tenkey-key {
        min-height: 56px;
        height: 56px;
        line-height: 56px;
        font-size: 30px;
      }
      .tenkey-key.backtab-key,
      .tenkey-key.small-label,
      .tenkey-key.return-key {
        font-size: 80%;
      }
      .tenkey-key.return-key {
        min-height: 120px;
        height: 120px;
        line-height: 120px;
      }
    }




    /* Ver.1335: iOSテンキー連打時のダブルタップ拡大抑止 */
    .modal-overlay.show,
    .modal-container,
    .tenkey-wrap,
    .tenkey-table,
    .tenkey-key {
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }


    /* 全体表示モード：ライト／ダーク */
    body.theme-dark {
      background: #11161b;
      color: #f3f6f8;
    }

    body.theme-dark .sticky-top {
      background: rgba(17, 22, 27, 0.96);
      border-bottom-color: #343b44;
      box-shadow: 0 2px 12px rgba(0,0,0,0.45);
    }

    body.theme-dark section,
    body.theme-dark .round,
    body.theme-dark .image-preview {
      background: #171d22;
      border-color: #3a424c;
      color: #f3f6f8;
    }

    body.theme-dark .total-card,
    body.theme-dark .setting-card,
    body.theme-dark .input-card {
      background: #20272e;
      border-color: #3a424c;
      color: #f3f6f8;
    }

    body.theme-dark .name,
    body.theme-dark h1,
    body.theme-dark h2,
    body.theme-dark .modal-round-title,
    body.theme-dark .player-btn,
    body.theme-dark input {
      color: #f3f6f8;
    }

    body.theme-dark .muted,
    body.theme-dark label,
    body.theme-dark .version,
    body.theme-dark .modal-help,
    body.theme-dark .balance {
      color: #b7c1cc;
    }

    body.theme-dark input {
      background: #11161b;
      border-color: #59616b;
      -webkit-text-fill-color: #f3f6f8;
    }

    body.theme-dark .player-btn {
      background: #303842;
      border-color: #59616b;
    }

    body.theme-dark .input-card.locked,
    body.theme-dark .setting-card.locked {
      background: #222a32;
      opacity: 0.72;
    }

    body.theme-dark .input-card.locked .player-btn {
      background: transparent;
      border-color: transparent;
    }

    body.theme-dark .input-card input:disabled {
      background: #1a2026;
      color: #f3f6f8;
      -webkit-text-fill-color: #f3f6f8;
    }

    body.theme-dark button.secondary,
    body.theme-dark button.input-mode,
    body.theme-dark button.all-lock {
      background: #28323c;
      color: #d9e8f8;
    }

    body.theme-dark button.input-mode.active,
    body.theme-dark button.round-lock.locked {
      background: #174c7c;
      color: #ffffff;
    }

    body.theme-dark .popup-score-input.active {
      border-color: #7fb2ff;
      box-shadow: 0 0 0 2px rgba(127,178,255,0.25);
      background: #11161b;
    }

    body.theme-dark .modal-overlay {
      background: rgba(0,0,0,0.72);
    }

    body.theme-dark .tenkey-wrap {
      background: #202428;
      border-color: #3a424c;
    }

    body.theme-dark .tenkey-key {
      background: #0d1114;
      border-color: #333b43;
      color: #ffffff;
      box-shadow: inset 0 2px 2px rgba(255,255,255,0.12), 0 3px 3px rgba(0,0,0,0.55);
    }

    body.theme-dark .tenkey-key:active {
      background: #2a3036;
    }

    body.theme-dark .image-preview img {
      background: #ffffff;
    }


    /* Ver.1350: モデルチェンジ入力表＋設定Pop */
    header.app-header {
      max-width: 720px;
      margin: 0 auto;
      padding: 10px 12px;
    }
    .app-title-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .app-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      object-fit: cover;
      flex: 0 0 auto;
    }
    .app-header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
    }
    button.icon-settings {
      width: 52px;
      min-height: 52px;
      padding: 0;
      border-radius: 9px;
      font-size: 28px;
      line-height: 52px;
      text-align: center;
      background: #0d4f95;
      color: #ffffff;
    }
    .sticky-inner section.total-sticky-section {
      margin-bottom: 0;
    }
    .total-sticky-section .section-head {
      align-items: flex-start;
    }
    .total-sticky-section #makeImage {
      min-width: 160px;
      min-height: 48px;
      font-size: 18px;
      background: #0d4f95;
      color: #ffffff;
    }
    .score-table-wrap {
      width: 100%;
